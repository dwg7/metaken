<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>metaken — 測量範囲マップ</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  #map { position: absolute; inset: 0; }
  .panel {
    position: absolute; top: 12px; left: 12px; width: 20rem; max-width: calc(100vw - 24px);
    /* Fixed footprint (not max-height) on purpose: if the panel's own size
       reacts to what's hovered, its bottom edge moves under the (stationary)
       cursor as content changes, which can expose/cover map pixels under the
       pointer and re-trigger the map's own hover handling -- a feedback loop
       that reads as the panel flickering. A constant height, scrolling
       internally, has no boundary left to feed back on. */
    height: min(60vh, 420px);
    background: rgba(252, 252, 251, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    padding: 0.8rem 1rem; font-size: 0.82rem; line-height: 1.5; color: #0b0b0b;
    z-index: 10; overflow-y: auto;
  }
  .panel h1 { font-size: 0.95rem; margin: 0 0 0.3rem; }
  .panel p { margin: 0.3rem 0; color: #52514e; }
  .panel a { color: #256abf; }

  /* Hover metadata tree */
  #feature-info { display: none; }
  #feature-info .count { margin: 0 0 0.5rem; font-weight: 600; color: #0b0b0b; }
  #feature-info details {
    border-top: 1px solid rgba(11,11,11,0.08); padding: 0.35rem 0;
  }
  #feature-info details:last-child { border-bottom: 1px solid rgba(11,11,11,0.08); }
  #feature-info summary {
    cursor: pointer; font-size: 0.8rem; color: #0b0b0b;
    display: flex; align-items: baseline; gap: 0.4rem;
  }
  #feature-info summary .swatch {
    flex: none; width: 0.6rem; height: 0.6rem; border-radius: 2px; margin-top: 0.15rem;
  }
  #feature-info summary .title { flex: 1; }
  #feature-info dl {
    margin: 0.4rem 0 0.2rem 1rem; font-size: 0.76rem;
    display: grid; grid-template-columns: auto 1fr; gap: 0.15rem 0.6rem;
  }
  #feature-info dt { color: #898781; }
  #feature-info dd { margin: 0; color: #52514e; word-break: break-all; }
  #feature-info .truncated { color: #898781; font-size: 0.76rem; margin: 0.4rem 0 0; }

  @media (prefers-color-scheme: dark) {
    .panel { background: rgba(26, 26, 25, 0.85); color: #ffffff; }
    .panel p { color: #c3c2b7; }
    .panel a { color: #3987e5; }
    #feature-info .count { color: #ffffff; }
    #feature-info summary { color: #ffffff; }
    #feature-info details { border-color: rgba(255,255,255,0.12); }
    #feature-info details:last-child { border-color: rgba(255,255,255,0.12); }
    #feature-info dt { color: #898781; }
    #feature-info dd { color: #c3c2b7; }
  }
</style>
</head>
<body>
<div id="map"></div>
<div class="panel">
  <h1>metaken — 測量範囲マップ</h1>
  <div id="intro">
    <p>公共測量成果等メタデータの空間範囲（bbox）を、国土地理院最適化ベクトルタイル上に重ねています。線の色は測量メイン/地図メインの分類を示します。ポリゴンにカーソルを合わせると、その範囲のメタデータがここに表示されます。</p>
    <p><a href="../index.html">← レポートに戻る</a></p>
  </div>
  <div id="feature-info"></div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
