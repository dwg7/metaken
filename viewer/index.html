<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>metaken — 測量範囲マップ</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  #map { position: absolute; inset: 0; }
  .panel {
    position: absolute; top: 12px; left: 12px; max-width: 20rem;
    background: rgba(252, 252, 251, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    padding: 0.8rem 1rem; font-size: 0.82rem; line-height: 1.5; color: #0b0b0b;
    z-index: 10;
  }
  .panel h1 { font-size: 0.95rem; margin: 0 0 0.3rem; }
  .panel p { margin: 0.3rem 0; color: #52514e; }
  .panel a { color: #256abf; }
  @media (prefers-color-scheme: dark) {
    .panel { background: rgba(26, 26, 25, 0.85); color: #ffffff; }
    .panel p { color: #c3c2b7; }
    .panel a { color: #3987e5; }
  }
</style>
</head>
<body>
<div id="map"></div>
<div class="panel">
  <h1>metaken — 測量範囲マップ</h1>
  <p>公共測量成果等メタデータの空間範囲（bbox）を、国土地理院最適化ベクトルタイル上に重ねています。線の色は測量メイン/地図メインの分類を示します。</p>
  <p><a href="../index.html">← レポートに戻る</a></p>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
